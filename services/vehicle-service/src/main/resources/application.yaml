server:
  port: 8081 # Port spÈcifique pour Èviter les conflits avec les autres services

spring:
  application:
    name: vehicle-service

  # Configuration de la base de donnÈes (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/flotte_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  # Configuration Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: update # CrÈe ou met ‡ jour les tables automatiquement selon tes entitÈs Java
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configuration Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: vehicle-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.flotte.vehicle.model"