# infra/kubernetes/ingress/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flotte-ingress
  namespace: flotte-namespace
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: flotte.local
      http:
        paths:
          - path: /api/vehicles
            pathType: Prefix
            backend:
              service:
                name: vehicle-service
                port:
                  number: 8080
          - path: /api/drivers
            pathType: Prefix
            backend:
              service:
                name: driver-service
                port:
                  number: 8081
          - path: /api/maintenance
            pathType: Prefix
            backend:
              service:
                name: maintenance-service
                port:
                  number: 8082
          - path: /api/events
            pathType: Prefix
            backend:
              service:
                name: event-service
                port:
                  number: 8083
          - path: /api/location
            pathType: Prefix
            backend:
              service:
                name: location-service
                port:
                  number: 3000