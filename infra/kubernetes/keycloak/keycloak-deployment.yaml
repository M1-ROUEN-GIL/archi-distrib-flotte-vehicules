apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-deployment
  namespace: flotte-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          # Pas :latest — Keycloak 26+ a changé l'admin bootstrap ; :latest casse start-dev + KEYCLOAK_ADMIN.
          image: quay.io/keycloak/keycloak:26.5.7
          command: ["/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm"]
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgres-flotte-service:5432/keycloak_db?sslmode=disable"
            - name: KC_DB_USERNAME
              value: "admin"
            - name: KC_DB_PASSWORD
              value: "password"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            # Aligné avec l’ingress `path: /auth` et les URLs JWK des microservices
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
          ports:
            - containerPort: 8080
              name: http
          # Sans ça, le pod passe « Ready » alors que Keycloak boot encore → nginx / Bruno → 503 sur /auth
          startupProbe:
            httpGet:
              path: /auth/realms/gestion-flotte
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /auth/realms/gestion-flotte
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/realm.json
              subPath: realm.json
              readOnly: true
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-config
