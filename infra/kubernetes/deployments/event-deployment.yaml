apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-service-deployment
  namespace: flotte-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events-service
  template:
    metadata:
      labels:
        app: events-service
    spec:
      containers:
        - name: events-app
          image: events-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: EVENTS_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: KAFKA_BROKER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: KAFKA_BROKER
            - name: KEYCLOAK_JWK_SET_URI
              value: "http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
