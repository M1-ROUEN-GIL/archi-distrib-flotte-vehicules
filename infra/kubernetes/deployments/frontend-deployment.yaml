apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: flotte-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: archi-dist-flotte-vehicules-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
