apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway-deployment
  namespace: flotte-namespace
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: graphql-gateway
  template:
    metadata:
      labels:
        app: graphql-gateway
    spec:
      containers:
        - name: graphql-gateway
          image: graphql-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          startupProbe:
            tcpSocket:
              port: 4000
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: 4000
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
          env:
            - name: VEHICLE_SERVICE_URL
              value: "http://vehicle-service.flotte-namespace.svc.cluster.local:8080"
            - name: DRIVER_SERVICE_URL
              value: "http://driver-service.flotte-namespace.svc.cluster.local:8080"
            - name: MAINTENANCE_SERVICE_URL
              value: "http://maintenance-service.flotte-namespace.svc.cluster.local:8080"
            - name: LOCATION_SERVICE_URL
              value: "http://location-service.flotte-namespace.svc.cluster.local:3000"
            - name: LOCATION_GRPC_URL
              value: "location-service.flotte-namespace.svc.cluster.local:50051"
            - name: EVENTS_SERVICE_URL
              value: "http://events-service.flotte-namespace.svc.cluster.local:8080"
            - name: OTEL_SERVICE_NAME
              value: "graphql-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.flotte-namespace.svc.cluster.local:4318"
