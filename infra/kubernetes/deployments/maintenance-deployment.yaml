apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-deployment
  namespace: flotte-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintenance
  template:
    metadata:
      labels:
        app: maintenance
    spec:
      hostAliases:
      - ip: "10.96.221.20"
        hostnames:
        - "flotte.local"
      containers:
        - name: maintenance-app
          image: maintenance-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080 # Le service écoute sur 8080 en interne
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: MAINTENANCE_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: KAFKA_BROKER
            - name: KEYCLOAK_JWK_SET_URI
              value: "http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
