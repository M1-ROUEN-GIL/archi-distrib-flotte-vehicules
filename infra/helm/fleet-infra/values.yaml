namespace: flotte-namespace

# PostgreSQL unique — bases métier créées au démarrage par chaque microservice (flotte.postgres.*).
# Keycloak se connecte à la base par défaut "postgres" (auth.database) : pas de CREATE DATABASE séparé.
postgresql:
  fullnameOverride: "postgres-flotte-service"
  auth:
    username: "admin"
    database: "postgres"
  primary:
    initdb:
      scripts:
        create-databases.sql: |
          CREATE DATABASE driver_db;
          CREATE DATABASE maintenance_db;
          CREATE DATABASE vehicle_db;
          CREATE DATABASE events_db;
          CREATE DATABASE keycloak_db;
    persistence:
      enabled: false

postgresql-maintenance:
  enabled: false

postgresql-driver:
  enabled: false

# 2. Configuration de Redis
redis:
  fullnameOverride: "redis-service"

  architecture: "standalone"

  auth:
    enabled: false
  
  master:
    persistence:
      enabled: false

# 3. Configuration de Kafka (KRaft mode)
kafka:
  image: confluentinc/cp-kafka:7.5.0
  port: 9092
