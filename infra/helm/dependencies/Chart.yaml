apiVersion: v2
name: fleet-infra
description: Infrastructure lourde (PostgreSQL, Kafka, Redis) pour le projet
type: application
version: 1.0.0

# Helm lira cette liste et téléchargera automatiquement ces bases de données
dependencies:
  - name: postgresql
    version: "18.5.6"
    repository: "https://charts.bitnami.com/bitnami"

  - name: redis
    version: "25.3.2"  # Force la toute dernière version du jour
    repository: "https://charts.bitnami.com/bitnami"