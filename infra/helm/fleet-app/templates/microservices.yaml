{{- range $key, $val := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $val.name }}-deployment
  namespace: {{ $.Values.namespace }}
spec:
  replicas: {{ $val.replicas }}
  selector:
    matchLabels:
      app: {{ $key }}
  template:
    metadata:
      labels:
        app: {{ $key }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-flotte-service 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka-service 9092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: {{ $key }}-app
          image: {{ $val.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ $val.port }}
          env:
            # dev + otel : logback-spring.xml du vehicle-service active OpenTelemetryAppender (dépendance runtime).
            # Docker Compose reste sur « dev » seul pour éviter l’export OTLP en local.
            - name: SPRING_PROFILES_ACTIVE
              value: {{ printf "%s,otel" ($val.profile | default "dev") | quote }}
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: {{ default "SPRING_DATASOURCE_URL" $val.dbUrlKey }}
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                  secretKeyRef:
                    name: db-secrets
                    key: KAFKA_BROKER
            # Même valeur que SPRING_KAFKA_* : vehicle-service lit ${KAFKA_BROKER} dans application.yaml
            - name: KAFKA_BROKER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: KAFKA_BROKER
            # Configuration Keycloak (SSO)
            - name: KEYCLOAK_ISSUER_URI
              value: {{ $.Values.keycloak_issuer | default "http://keycloak-service:8080/realms/gestion-flotte" | quote }}
            - name: KEYCLOAK_JWK_SET_URI
              value: {{ $.Values.keycloak_jwk_set_uri | default "http://keycloak-service:8080/realms/gestion-flotte/protocol/openid-connect/certs" | quote }}
            # Variables OpenTelemetry - On utilise le port 4318 (HTTP) pour la compatibilite totale
            - name: OTEL_SERVICE_NAME
              value: {{ $val.name }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.{{ $.Values.namespace }}.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/app/opentelemetry-javaagent.jar"
            - name: OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED
              value: "true"
          # Première sonde après 60s : avant ça, « connection refused » sur :8080 est normal (JVM pas encore à l’écoute).
          startupProbe:
            tcpSocket:
              port: {{ $val.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 36
          # TCP seul peut laisser « Ready » trop tôt ; l’ingress renvoie alors 503 jusqu’à ce que Spring réponde vraiment.
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $val.port }}
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: {{ $val.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
             requests:
                    memory: "256Mi"
                    cpu: "250m"
             limits:
                    memory: "768Mi"
                    cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $val.name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ $key }}
  ports:
    - protocol: TCP
      port: {{ $val.port }}
      targetPort: {{ $val.port }}
{{- end }}
