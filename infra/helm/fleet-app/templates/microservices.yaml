{{- range $key, $val := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $val.name }}-deployment
  namespace: {{ $.Values.namespace }}
spec:
  replicas: {{ $val.replicas }}
  selector:
    matchLabels:
      app: {{ $key }}
  template:
    metadata:
      labels:
        app: {{ $key }}
    spec:
      containers:
        - name: {{ $key }}-app
          image: {{ $val.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ $val.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                  secretKeyRef:
                    name: db-secrets
                    key: KAFKA_BROKER
            # Configuration Keycloak (SSO)
            - name: KEYCLOAK_ISSUER_URI
              value: "http://keycloak-service:8080/realms/gestion-flotte"
            - name: KEYCLOAK_JWK_SET_URI
              value: "http://keycloak-service:8080/realms/gestion-flotte/protocol/openid-connect/certs"
            # Variables OpenTelemetry pour l'Agent Java
            - name: OTEL_SERVICE_NAME
              value: {{ $val.name }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.{{ $.Values.namespace }}.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED
              value: "true"
          resources:
             requests:
                    memory: "256Mi"
                    cpu: "250m"
             limits:
                    memory: "512Mi"
                    cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $val.name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ $key }}
  ports:
    - protocol: TCP
      port: {{ $val.port }}
      targetPort: {{ $val.port }}
{{- end }}
