namespace: flotte-namespace

# Configuration des Services Applicatifs
services:
  vehicle:
    name: vehicle-service
    image: vehicle-service:latest
    port: 8080
    # Minikube : 2× Spring + OTEL peut saturer la RAM — passer à 2 en prod si besoin
    replicas: 1
  driver:
    name: driver-service
    image: driver-service:latest
    port: 8080
    replicas: 1
    dbUrlKey: DRIVER_DATASOURCE_URL
  maintenance:
    name: maintenance-service
    image: maintenance-service:latest
    port: 8080
    replicas: 1
    dbUrlKey: MAINTENANCE_DATASOURCE_URL
  events:
    name: events-service
    image: events-service:latest
    port: 8080
    replicas: 1
    dbUrlKey: EVENTS_DATASOURCE_URL

# Gateway GraphQL (Ingress /graphql)
graphqlGateway:
  image: graphql-gateway:latest
  port: 4000

# Même arbre d’URL que Keycloak avec KC_HTTP_RELATIVE_PATH=/auth (K8s + ingress /auth)
keycloak_issuer: "http://keycloak-service:8080/auth/realms/gestion-flotte"
keycloak_jwk_set_uri: "http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs"
