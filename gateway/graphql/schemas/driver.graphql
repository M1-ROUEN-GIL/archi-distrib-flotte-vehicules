# driver.graphql
# Domaine Conducteurs — Service Conducteurs (Spring Boot)

type Driver {
  id: ID!
  keycloak_user_id: ID!
  first_name: String!
  last_name: String!
  email: String!
  phone: String
  employee_id: String
  status: DriverStatus!
  # Résolu par le Service Conducteurs
  license: DriverLicense
  # Résolu par le Service Véhicules
  current_assignment: Assignment
  created_at: String!
}

type DriverLicense {
  id: ID!
  license_number: String!
  category: String!
  expiry_date: String!
  is_valid: Boolean!
  country: String!
}

type DriverPage {
  items: [Driver!]!
  total_count: Int!
}

extend type Query {
  drivers(
    status: DriverStatus
    limit: Int = 20
    offset: Int = 0
  ): DriverPage!

  driver(id: ID!): Driver
}

extend type Mutation {
  createDriver(
    keycloak_user_id: ID!
    first_name: String!
    last_name: String!
    email: String!
    phone: String
    employee_id: String
  ): Driver!

  updateDriverStatus(
    id: ID!
    status: DriverStatus!
  ): Driver!

  # Pour le @PutMapping("/{id}")
  updateDriver(
    id: ID!
    keycloak_user_id: ID!
    first_name: String
    last_name: String
    email: String
    phone: String
    employee_id: String
  ): Driver!

  # Pour le @DeleteMapping("/{id}")
  deleteDriver(id: ID!): Boolean

  # Pour le @PostMapping("/{id}/licenses")
  addLicenseToDriver(
    driver_id: ID!
    license_number: String!
    category: String!
    expiry_date: String!
    is_valid: Boolean!
    country: String!
  ): DriverLicense!
}
