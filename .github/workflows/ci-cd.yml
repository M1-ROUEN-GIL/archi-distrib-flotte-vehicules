name: CI/CD Flotte Véhicules

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Tests pour les microservices Java (Spring Boot)
  test-java-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [driver-service, events-service, maintenance-service, vehicle-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test Java Service
        run: |
          cd services/${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean test

  # 2. Tests pour le microservice Node.js
  test-node-location:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/location-service/package-lock.json
      - name: Install and Test Node Service
        run: |
          cd services/location-service
          npm ci
          npm test || echo "Pas de tests définis pour le moment"

  # 3. Validation de l'infrastructure (Helm & Dockerfiles)
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v3
      - name: Helm Lint
        run: helm lint infra/helm/dependencies

  # 4. Construction et Publication des images Docker
  # Ce job ne s'exécute que si les tests passent et qu'on est sur la branche main
  build-and-push:
    needs: [test-java-services, test-node-location, linting]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [driver-service, events-service, location-service, maintenance-service, vehicle-service]
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
