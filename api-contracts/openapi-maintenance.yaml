openapi: 3.0.3
info:
  title: API Service Maintenance
  version: 1.0.0
  description: Planification et suivi des interventions de maintenance.
paths:
  /maintenance:
    get:
      summary: Lister les fiches de maintenance
      parameters:
        - name: vehicle_id
          in: query
          description: Filtrer par véhicule
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des opérations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MaintenanceRecord'
    post:
      summary: Planifier une intervention
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceInput'
      responses:
        '201':
          description: Intervention planifiée

components:
  schemas:
    MaintenanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [oil_change, tire_rotation, inspection, repair, recall, other]
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        priority:
          type: string
          enum: [low, medium, high, critical]
        scheduled_date:
          type: string
          format: date
    MaintenanceInput:
      type: object
      required: [vehicle_id, type, scheduled_date]
      properties:
        vehicle_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [oil_change, tire_rotation, inspection, repair, recall, other]
        priority:
          type: string
          enum: [low, medium, high, critical]
        scheduled_date:
          type: string
          format: date