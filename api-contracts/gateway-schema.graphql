# gateway-schema.graphql

type Vehicle {
  id: ID!
  plate_number: String!
  brand: String!
  model: String!
  fuel_type: String!
  status: String!
  mileage_km: Int!
  # L'API Gateway fera le lien avec le service Localisation !
  current_location: Location 
}

type Driver {
  id: ID!
  first_name: String!
  last_name: String!
  status: String!
}

type Location {
  latitude: Float!
  longitude: Float!
  speed_kmh: Float
}

type Query {
  vehicles: [Vehicle!]!
  vehicle(id: ID!): Vehicle
  drivers: [Driver!]!
}

type Mutation {
  addVehicle(plate_number: String!, brand: String!, model: String!, fuel_type: String!): Vehicle!
}