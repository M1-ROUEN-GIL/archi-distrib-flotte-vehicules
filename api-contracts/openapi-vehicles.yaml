openapi: 3.0.3
info:
  title: API Service Véhicules
  version: 1.0.0
  description: API CRUD pour la gestion du parc automobile.
paths:
  /vehicles:
    get:
      summary: Lister les véhicules
      responses:
        '200':
          description: Liste des véhicules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
    post:
      summary: Ajouter un nouveau véhicule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '201':
          description: Véhicule créé
components:
  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plate_number:
          type: string
        brand:
          type: string
        model:
          type: string
        fuel_type:
          type: string
          enum: [gasoline, diesel, electric, hybrid, lpg]
        status:
          type: string
          enum: [available, in_use, maintenance, out_of_service, reserved]
        mileage_km:
          type: integer
    VehicleInput:
      
      type: object
      required: [plate_number, brand, model, fuel_type]
      properties:
        plate_number:
          type: string
        brand:
          type: string
        model:
          type: string
        fuel_type:
          type: string