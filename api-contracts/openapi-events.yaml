openapi: 3.0.3
info:
  title: API Service Événements
  version: 1.0.0
  description: Gestion des alertes et notifications du système.
paths:
  /alerts:
    get:
      summary: Lister les alertes
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved, expired]
      responses:
        '200':
          description: Liste des alertes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
  /alerts/{id}/acknowledge:
    post:
      summary: Acquitter une alerte
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Alerte acquittée

components:
  schemas:
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [maintenance_due, vehicle_breakdown, accident, license_expiring, geofence_violation, speed_exceeded]
        severity:
          type: string
          enum: [info, warning, high, critical]
        status:
          type: string
          enum: [active, acknowledged, resolved, expired]
        message:
          type: string
        vehicle_id:
          type: string
          format: uuid