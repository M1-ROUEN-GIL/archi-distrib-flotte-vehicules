openapi: 3.0.3
info:
  title: API Service Conducteurs
  version: 1.0.0
  description: Gestion des profils conducteurs et de leurs permis.
paths:
  /drivers:
    get:
      summary: Lister les conducteurs
      responses:
        '200':
          description: Liste des conducteurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'
    post:
      summary: Ajouter un nouveau conducteur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverInput'
      responses:
        '201':
          description: Conducteur créé
  /drivers/{id}/licenses:
    get:
      summary: Récupérer les permis d'un conducteur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des permis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/License'

components:
  schemas:
    Driver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        keycloak_user_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, inactive]
    DriverInput:
      type: object
      required: [keycloak_user_id, first_name, last_name, email]
      properties:
        keycloak_user_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
    License:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_number:
          type: string
        category:
          type: string
          enum: [A, B, C, D]
        is_valid:
          type: boolean