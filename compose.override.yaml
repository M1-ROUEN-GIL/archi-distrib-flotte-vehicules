services:
  # 1. Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: flotte-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - QUERY_BASE_PATH=/jaeger
    ports:
      - "16686:16686" # Web UI
      # 4317 est géré exclusivement par otel-collector (pas de bind direct pour Jaeger)
    restart: unless-stopped

  # 2. Prometheus - Metrics
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: flotte-prometheus
    volumes:
      - ./infra/helm/fleet-observability/config/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  # 3. Loki - Log Aggregation
  loki:
    image: grafana/loki:2.9.4
    container_name: flotte-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: unless-stopped

  # 4. Grafana - Dashboard Visualization
  grafana:
    image: grafana/grafana:10.4.1
    container_name: flotte-grafana
    volumes:
      - ./infra/helm/fleet-observability/config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
      - jaeger
    restart: unless-stopped

  # 5. OpenTelemetry Collector - Central Ingestion
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: flotte-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/helm/fleet-observability/config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter metrics
    depends_on:
      - jaeger
      - prometheus
      - loki
    restart: unless-stopped

  # 6. Promtail - collecte logs frontend + location (non-OTLP)
  promtail:
    image: grafana/promtail:2.9.4
    container_name: flotte-promtail
    command: -config.file=/etc/promtail/config.yaml
    user: root
    volumes:
      - ./infra/helm/fleet-observability/config/promtail-docker-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    restart: unless-stopped
