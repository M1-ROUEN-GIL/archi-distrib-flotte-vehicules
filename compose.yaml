services:
  # Un seul PostgreSQL ; bases métier par service ; Keycloak utilise la base par défaut "postgres" (pas de script SQL dédié).
  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: flotte-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: flotte-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: flotte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  keycloak-service:
    # Version épinglée — :latest (26+) exige KC_BOOTSTRAP_ADMIN_* (KEYCLOAK_ADMIN est déprécié)
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: flotte-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/postgres?sslmode=disable
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HTTP_RELATIVE_PATH: "/auth"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: flotte-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flotte.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  vehicle:
    build:
      context: ./services/vehicle-service
      dockerfile: Dockerfile
    container_name: flotte-vehicle
    environment:
      - SPRING_PROFILES_ACTIVE=dev,otel
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=vehicle-service
      - JAVA_TOOL_OPTIONS=-javaagent:opentelemetry-javaagent.jar
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vehicle_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak-service:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  maintenance:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: flotte-maintenance
    environment:
      - SPRING_PROFILES_ACTIVE=dev,otel
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - JAVA_TOOL_OPTIONS=-javaagent:opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=maintenance-service
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/maintenance_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak-service:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak-service:
        condition: service_started
    restart: unless-stopped

  driver:
    build:
      context: ./services/driver-service
      dockerfile: Dockerfile
    container_name: flotte-driver
    environment:
      - SPRING_PROFILES_ACTIVE=dev,otel
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - JAVA_TOOL_OPTIONS=-javaagent:opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=driver-service
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/driver_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak-service:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak-service:
        condition: service_started
    restart: unless-stopped

  events:
    build:
      context: ./services/events-service
      dockerfile: Dockerfile
    container_name: flotte-events
    environment:
      - SPRING_PROFILES_ACTIVE=dev,otel
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - JAVA_TOOL_OPTIONS=-javaagent:opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=events-service
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/events_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak-service:8080/auth/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak-service:8080/auth/realms/gestion-flotte/protocol/openid-connect/certs
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak-service:
        condition: service_started
    restart: unless-stopped
      
  location:
    build:
      context: ./services/location-service
      dockerfile: Dockerfile
    container_name: flotte-location
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_NAME=postgres # On utilise la base par défaut de ton TimescaleDB
      - KAFKA_BROKER=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=location-service
    ports:
      - "50051:50051" # Port gRPC (simulateur externe)
      - "3000:3000"      # (utile pour le frontend)
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('net').createConnection(50051, '127.0.0.1').on('connect', () => { process.exit(0); }).on('error', () => { process.exit(1); })\"" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak-service:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: flotte-gateway
    environment:
      - VEHICLE_SERVICE_URL=http://vehicle:8080
      - DRIVER_SERVICE_URL=http://driver:8080
      - MAINTENANCE_SERVICE_URL=http://maintenance:8080
      - EVENTS_SERVICE_URL=http://events:8080
      - LOCATION_SERVICE_URL=http://location:3000
      - LOCATION_GRPC_URL=location:50051
      - KAFKA_BROKER=kafka:9092
      - OTEL_SERVICE_NAME=graphql-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    ports:
      - "4000:4000"
      - "127.0.0.1:80:4000"
      - "[::1]:80:4000"
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
      vehicle:
        condition: service_started
      driver:
        condition: service_started
      maintenance:
        condition: service_started
      events:
        condition: service_started
      location:
        condition: service_started
    restart: unless-stopped

  kafka-setup:
    image: apache/kafka:3.7.0
    container_name: flotte-kafka-setup
    depends_on:
      kafka:
        condition: service_started
    command: >
      /bin/sh -c "
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic flotte.localisation.gps --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic flotte.location.events --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic flotte.alerts.created --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flotte-frontend
    ports:
      - "3005:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
