services:
  # 1. Base de données PostgreSQL + TimescaleDB pour le service Véhicules
  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: flotte-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flotte_db
    ports:
      - "5432:5432"
    volumes:
      - ./services/vehicle-service/db/migrations/01-vehicle.sql:/docker-entrypoint-initdb.d/01-vehicle.sql
      - ./services/events-service/db/migrations/04-events.sql:/docker-entrypoint-initdb.d/04-events.sql
      - ./services/location-service/db/migrations/05-location.sql:/docker-entrypoint-initdb.d/05-location.sql
      - ./services/vehicle-service/db/seeds/20-vehicle-seed.sql:/docker-entrypoint-initdb.d/20-vehicle-seed.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 1b. Base de données PostgreSQL pour le service Maintenance
  postgres-maintenance:
    image: postgres:15-alpine
    container_name: flotte-postgres-maintenance
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maintenance_db
    ports:
      - "5435:5432"
    volumes:
      - ./services/maintenance-service/db/migrations/03-maintenance.sql:/docker-entrypoint-initdb.d/01-maintenance.sql
      - postgres_maintenance_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 1c. Base de données PostgreSQL pour le service Conducteurs
  postgres-driver:
    image: postgres:15-alpine
    container_name: flotte-postgres-driver
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: driver_db
    ports:
      - "5436:5432"
    volumes:
      - ./services/driver-service/db/migrations/02-driver.sql:/docker-entrypoint-initdb.d/01-driver.sql
      - ./services/driver-service/db/seeds/21-driver-seed.sql:/docker-entrypoint-initdb.d/21-driver-seed.sql
      - postgres_driver_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis
  redis:
    image: redis:7.2-alpine
    container_name: flotte-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Apache Kafka
  kafka:
    image: apache/kafka:3.7.0
    container_name: flotte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: unless-stopped

  # 4. Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: flotte-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/flotte_db
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: password
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - postgres
    restart: unless-stopped

  # 5. Interface d'administration web pour PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: flotte-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flotte.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
      - postgres-maintenance
      - postgres-driver
    restart: unless-stopped

  # 6. Microservice Véhicules
  vehicle:
    build:
      context: ./services/vehicle-service
      dockerfile: Dockerfile
    container_name: flotte-vehicle
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flotte_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/gestion-flotte/protocol/openid-connect/certs
      # Configuration pour l'Agent Java OpenTelemetry
      - OTEL_SERVICE_NAME=vehicle-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED=true
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - kafka
      - keycloak
    restart: unless-stopped

  # 6. Microservice Maintenance
  maintenance:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: flotte-maintenance
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-maintenance:5432/maintenance_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/gestion-flotte/protocol/openid-connect/certs
      # Configuration pour l'Agent Java OpenTelemetry
      - OTEL_SERVICE_NAME=maintenance-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED=true
    ports:
      - "8082:8080"
    depends_on:
      - postgres-maintenance
      - kafka
      - keycloak
    restart: unless-stopped

  # 7. Microservice Conducteurs
  driver:
    build:
      context: ./services/driver-service
      dockerfile: Dockerfile
    container_name: flotte-driver
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-driver:5432/driver_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_BROKER=kafka:9092
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/gestion-flotte
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/gestion-flotte/protocol/openid-connect/certs
      # Configuration pour l'Agent Java OpenTelemetry
      - OTEL_SERVICE_NAME=driver-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED=true
    ports:
      - "8081:8080"
    depends_on:
      - postgres-driver
      - kafka
      - keycloak
    restart: unless-stopped

  # 8. GraphQL Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: flotte-gateway
    environment:
      - VEHICLE_SERVICE_URL=http://vehicle:8080
      - DRIVER_SERVICE_URL=http://driver:8080
      - MAINTENANCE_SERVICE_URL=http://maintenance:8080
      - OTEL_SERVICE_NAME=graphql-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    ports:
      - "4000:4000"
    depends_on:
      - vehicle
      - driver
      - maintenance
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_maintenance_data:
  postgres_driver_data:
  kafka_data:
